services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketplace
    # Условие лабы: localhost:5434 → 5432. При конфликте порта на хосте: POSTGRES_HOST_PORT в .env
    ports:
      - "${POSTGRES_HOST_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
      - ./sql:/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/marketplace
      REDIS_URL: redis://redis:6379/0
    # Условие лабы: localhost:8082 → 8080. При занятом порте: BACKEND_HOST_PORT в .env
    ports:
      - "${BACKEND_HOST_PORT:-8082}:8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    # Условие лабы: localhost:5174 → 5173
    ports:
      - "${FRONTEND_HOST_PORT:-5174}:5173"
    environment:
      VITE_API_URL: http://backend:8080

volumes:
  postgres_data:
  redis_data:

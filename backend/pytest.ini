[pytest]
testpaths = app/tests
asyncio_mode = auto
# Один event loop на сессию: иначе asyncpg/SQLAlchemy + httpx ASGI + BaseHTTPMiddleware дают
# RuntimeError: Future attached to a different loop при тестах против PostgreSQL.
asyncio_default_fixture_loop_scope = session
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
